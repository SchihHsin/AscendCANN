<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CANN Dashboard — 文件目录</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;color:#1e293b;min-height:100vh;padding:48px 24px}
.page{max-width:760px;margin:0 auto}
.header{margin-bottom:40px}
.header h1{font-size:22px;font-weight:800;color:#0f172a;letter-spacing:-.03em}
.header h1 span{color:#3b82f6}
.header p{font-size:13px;color:#64748b;margin-top:6px}
.grid{display:flex;flex-direction:column;gap:10px}
.card{display:flex;align-items:center;gap:16px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px 20px;text-decoration:none;color:inherit;transition:.15s;cursor:pointer}
.card:hover{border-color:#3b82f6;box-shadow:0 4px 16px rgba(59,130,246,.12);transform:translateY(-1px)}
.card-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.card-body{flex:1;min-width:0}
.card-title{font-size:14px;font-weight:700;color:#0f172a;margin-bottom:3px}
.card-desc{font-size:12px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:11px;color:#94a3b8;white-space:nowrap;flex-shrink:0;text-align:right}
.card-meta .size{display:block}
.card-meta .date{display:block;margin-top:1px}
.tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;margin-right:5px;vertical-align:middle}
.tag-new{background:#dbeafe;color:#1d4ed8}
.tag-main{background:#f0fdf4;color:#15803d}
.section-label{font-size:10px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.1em;margin:24px 0 8px}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>CANN <span>Dashboard</span> 文件目录</h1>
    <p>点击卡片在新标签页中打开对应页面</p>
  </div>

  <div class="section-label">设计分析</div>
  <div class="grid">
    <a class="card" href="analysis.html" target="_blank">
      <div class="card-icon" style="background:#fef9ee;color:#d97706">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg>
      </div>
      <div class="card-body">
        <div class="card-title">CANN体验看板设计分析</div>
        <div class="card-desc">角色筛选 · 痛点联动 · ECharts 图表</div>
      </div>
      <div class="card-meta"><span class="size">96 KB</span></div>
    </a>
  </div>

  <div class="section-label">设计 Demo</div>
  <div class="grid">
    <a class="card" href="design-options.html" target="_blank">
      <div class="card-icon" style="background:#f5f3ff;color:#6366f1">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
      </div>
      <div class="card-body">
        <div class="card-title">CANN看板总览及用户旅程页 Demo</div>
        <div class="card-desc">看板总览 · 用户旅程 · 设计方案对比</div>
      </div>
      <div class="card-meta"><span class="size">124 KB</span></div>
    </a>
  </div>

  <div class="section-label">数据爬取实验</div>
  <div class="grid">
    <a class="card" href="04-journey-agentic-report.html" target="_blank">
      <div class="card-icon" style="background:#f0f9ff;color:#0ea5e9">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
      </div>
      <div class="card-body">
        <div class="card-title">GitCode 代码仓 Agentic 评分</div>
        <div class="card-desc">基于爬取数据的用户旅程分析</div>
      </div>
      <div class="card-meta"><span class="size">32 KB</span></div>
    </a>
  </div>
</div>
</body>
</html>
