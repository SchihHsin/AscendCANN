<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CANN 体验看板 - 方案对比</title>
<style>
*,
*::before,
*::after { box-sizing: border-box; }

:root {
  --bg: #f3ede4;
  --paper: rgba(255, 249, 242, .82);
  --panel: rgba(255, 255, 255, .86);
  --line: rgba(74, 54, 33, .12);
  --ink: #1d1813;
  --muted: #6e6255;
  --accent: #b53b23;
  --accent-soft: rgba(181, 59, 35, .10);
  --teal: #0f766e;
  --teal-soft: rgba(15, 118, 110, .12);
  --amber: #b87916;
  --amber-soft: rgba(184, 121, 22, .12);
  --good-bg: linear-gradient(180deg, #edf8f2 0%, #d7eee2 100%);
  --mid-bg: linear-gradient(180deg, #fff8ec 0%, #f5e4c5 100%);
  --bad-bg: linear-gradient(180deg, #fff3f0 0%, #f5d8d1 100%);
  --shadow: 0 18px 48px rgba(74, 48, 24, .10);
}

html,
body {
  height: 100%;
}

body {
  margin: 0;
  font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  color: var(--ink);
  background:
    radial-gradient(circle at top left, rgba(209, 128, 67, .14), transparent 24%),
    radial-gradient(circle at top right, rgba(18, 120, 117, .10), transparent 22%),
    linear-gradient(180deg, #f5efe8 0%, #eee5d8 100%);
}

button,
a {
  font: inherit;
}

.top {
  position: sticky;
  top: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  gap: 10px;
  height: 46px;
  padding: 7px 12px;
  backdrop-filter: blur(14px);
  background: rgba(245, 239, 232, .92);
  border-bottom: 1px solid rgba(74, 54, 33, .08);
}

.brand {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
  flex: 0 0 auto;
}

.brand img {
  width: 18px;
  height: 18px;
  object-fit: contain;
}

.brand-title {
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
}

.tabs {
  display: flex;
  align-items: center;
  gap: 6px;
  min-width: 0;
  overflow-x: auto;
}

.tab {
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, .56);
  color: var(--muted);
  border-radius: 999px;
  height: 32px;
  padding: 0 12px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: .16s ease;
  white-space: nowrap;
}

.tab:hover {
  transform: translateY(-1px);
}

.tab.active {
  color: var(--ink);
  background: #fff8f2;
  border-color: rgba(181, 59, 35, .24);
  box-shadow: 0 8px 20px rgba(181, 59, 35, .10);
}

.tab-code {
  min-width: 18px;
  height: 18px;
  padding: 0 6px;
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--accent-soft);
  color: var(--accent);
  font-size: 10px;
  font-weight: 800;
}

.tab-label {
  font-size: 12px;
  font-weight: 700;
  line-height: 1;
}

.page {
  height: calc(100vh - 46px);
  padding: 10px;
}

.page.legacy-mode {
  height: auto;
  min-height: calc(100vh - 46px);
}

.view {
  display: none;
  height: 100%;
}

.view.active {
  display: block;
}

#legacy-view.active {
  height: auto;
}

.panel {
  height: 100%;
  border: 1px solid rgba(255, 255, 255, .64);
  border-radius: 24px;
  overflow: hidden;
  background: var(--paper);
  box-shadow: var(--shadow);
}

.legacy-shell {
  position: relative;
  height: auto;
  min-height: calc(100vh - 66px);
  background: rgba(255, 252, 247, .72);
}

.legacy-actions {
  position: absolute;
  top: 12px;
  right: 12px;
  z-index: 5;
  display: flex;
  gap: 8px;
}

.ghost-btn {
  text-decoration: none;
  color: var(--muted);
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, .92);
  border-radius: 999px;
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 600;
  box-shadow: 0 8px 18px rgba(30, 20, 10, .10);
}

.legacy-frame {
  width: 100%;
  min-height: calc(100vh - 66px);
  border: 0;
  display: block;
  background: #fff;
}

.matrix-shell {
  display: grid;
  grid-template-rows: auto auto minmax(300px, 1fr);
  gap: 10px;
  padding: 10px;
  min-height: 100%;
  align-content: start;
  overflow: visible;
}

.surface {
  min-height: 0;
  background: var(--panel);
  border: 1px solid rgba(74, 54, 33, .08);
  border-radius: 22px;
  overflow: hidden;
}

.section-head {
  padding: 16px 16px 12px;
  border-bottom: 1px solid rgba(74, 54, 33, .08);
}

.eyebrow {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
}

.section-title {
  margin-top: 6px;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -.03em;
}

.section-sub {
  margin-top: 6px;
  font-size: 13px;
  line-height: 1.65;
  color: var(--muted);
}

.overview-list {
  padding: 12px;
  display: grid;
  gap: 12px;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  align-items: start;
}

.role-group {
  border: 1px solid rgba(74, 54, 33, .08);
  border-radius: 18px;
  background: rgba(255, 255, 255, .70);
  overflow: hidden;
  min-width: 0;
}

.role-meta {
  padding: 14px;
  border-bottom: 1px solid rgba(74, 54, 33, .08);
  background: rgba(255, 250, 244, .76);
}

.role-title {
  font-size: 16px;
  font-weight: 800;
}

.role-desc {
  margin-top: 6px;
  font-size: 12px;
  line-height: 1.65;
  color: var(--muted);
}

.scenario-list {
  padding: 10px;
  display: grid;
  gap: 8px;
  grid-template-columns: 1fr;
}

.scenario-card {
  width: 100%;
  border: 1px solid rgba(74, 54, 33, .08);
  border-radius: 16px;
  text-align: left;
  background: rgba(255, 255, 255, .82);
  padding: 12px;
  cursor: pointer;
  transition: .16s ease;
}

.overview-summary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 10px;
  padding: 0 16px 16px;
}

.summary-mini {
  padding: 10px 12px;
  border-radius: 14px;
  background: rgba(255, 255, 255, .72);
  border: 1px solid rgba(74, 54, 33, .08);
}

.summary-mini-label {
  font-size: 11px;
  color: var(--muted);
}

.summary-mini-value {
  margin-top: 6px;
  font-size: 18px;
  font-weight: 800;
}

.scenario-card.bad { background: var(--bad-bg); }
.scenario-card.mid { background: var(--mid-bg); }
.scenario-card.good { background: var(--good-bg); }

.scenario-card:hover,
.scenario-card.active {
  transform: translateY(-2px);
  border-color: rgba(181, 59, 35, .24);
  box-shadow: 0 12px 24px rgba(44, 28, 12, .10);
}

.scenario-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
}

.scenario-name {
  font-size: 14px;
  font-weight: 700;
  line-height: 1.5;
}

.score {
  font-size: 24px;
  line-height: 1;
  font-weight: 800;
}

.score.bad { color: var(--accent); }
.score.mid { color: var(--amber); }
.score.good { color: var(--teal); }

.scenario-note {
  margin-top: 10px;
  font-size: 12px;
  line-height: 1.65;
  color: rgba(29, 24, 19, .74);
}

.chip-row {
  margin-top: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.chip {
  padding: 4px 8px;
  border-radius: 999px;
  background: rgba(255, 255, 255, .76);
  border: 1px solid rgba(74, 54, 33, .08);
  font-size: 11px;
  color: var(--muted);
}

.story-shell {
  display: grid;
  grid-template-rows: auto auto;
  gap: 10px;
  min-width: 0;
}

.hero {
  padding: 18px 20px;
}

.hero-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

.hero-title {
  font-size: 30px;
  font-weight: 900;
  letter-spacing: -.04em;
}

.hero-sub {
  margin-top: 8px;
  max-width: 820px;
  font-size: 13px;
  line-height: 1.7;
  color: var(--muted);
}

.hero-badge {
  flex: 0 0 auto;
  padding: 10px 12px;
  border-radius: 16px;
  background: rgba(15, 118, 110, .08);
  color: var(--teal);
  font-size: 12px;
  line-height: 1.55;
}

.stats {
  margin-top: 16px;
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
}

.stat {
  padding: 12px 14px;
  border-radius: 16px;
  background: rgba(255, 255, 255, .76);
  border: 1px solid rgba(74, 54, 33, .08);
}

.stat-label {
  font-size: 11px;
  color: var(--muted);
}

.stat-value {
  margin-top: 8px;
  font-size: 22px;
  font-weight: 800;
}

.journey-shell {
  padding: 14px 14px 8px;
}

.journey-scroll {
  overflow-x: auto;
  padding-bottom: 6px;
}

.journey-grid {
  display: grid;
  gap: 10px;
  min-width: max-content;
}

.journey-intro,
.journey-step {
  min-height: 238px;
  border-radius: 18px;
  border: 1px solid rgba(74, 54, 33, .08);
  background: rgba(255, 255, 255, .82);
  padding: 14px;
}

.journey-intro {
  width: 220px;
  background: linear-gradient(180deg, rgba(255, 250, 245, .92) 0%, rgba(246, 237, 225, .92) 100%);
}

.journey-intro-title {
  margin-top: 10px;
  font-size: 18px;
  font-weight: 800;
  line-height: 1.45;
}

.journey-intro-sub {
  margin-top: 10px;
  font-size: 12px;
  line-height: 1.72;
  color: var(--muted);
}

.journey-step {
  width: 196px;
  text-align: left;
  cursor: pointer;
  transition: .16s ease;
}

.journey-step.bad { background: var(--bad-bg); }
.journey-step.mid { background: var(--mid-bg); }
.journey-step.good { background: var(--good-bg); }

.journey-step:hover,
.journey-step.active {
  transform: translateY(-2px);
  box-shadow: 0 12px 22px rgba(44, 28, 12, .12);
  border-color: rgba(181, 59, 35, .24);
}

.journey-step-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
}

.step-index {
  font-size: 11px;
  font-weight: 800;
  color: rgba(29, 24, 19, .48);
}

.step-name {
  margin-top: 6px;
  font-size: 15px;
  font-weight: 800;
}

.step-summary {
  margin-top: 12px;
  font-size: 12px;
  line-height: 1.65;
  color: rgba(29, 24, 19, .74);
}

.metric-grid {
  margin-top: 12px;
  display: grid;
  gap: 6px;
}

.metric {
  padding: 8px 10px;
  border-radius: 12px;
  background: rgba(255, 255, 255, .70);
  border: 1px solid rgba(74, 54, 33, .08);
}

.metric-label {
  font-size: 10px;
  color: var(--muted);
}

.metric-value {
  margin-top: 4px;
  font-size: 13px;
  font-weight: 700;
}

.detail-shell {
  display: grid;
  grid-template-rows: auto minmax(0, 1fr);
  min-height: 320px;
}

.detail-topbar {
  padding: 14px 16px;
  border-bottom: 1px solid rgba(74, 54, 33, .08);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
}

.detail-title {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -.03em;
}

.detail-sub {
  margin-top: 6px;
  font-size: 13px;
  line-height: 1.65;
  color: var(--muted);
}

.next-action {
  flex: 0 0 auto;
  max-width: 320px;
  padding: 10px 12px;
  border-radius: 16px;
  background: var(--accent-soft);
  color: #8c2818;
  font-size: 12px;
  line-height: 1.65;
}

.detail-grid {
  padding: 14px;
  display: grid;
  grid-template-columns: 1.2fr 1fr 1fr;
  gap: 10px;
  overflow: auto;
}

.detail-card {
  padding: 14px;
  border-radius: 18px;
  background: rgba(255, 255, 255, .80);
  border: 1px solid rgba(74, 54, 33, .08);
}

.detail-card h4 {
  margin: 0;
  font-size: 14px;
}

.detail-list {
  margin-top: 10px;
  display: grid;
  gap: 8px;
}

.detail-item {
  padding-left: 12px;
  position: relative;
  font-size: 12px;
  line-height: 1.72;
  color: var(--muted);
}

.detail-item::before {
  content: "";
  position: absolute;
  left: 0;
  top: .75em;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent);
}

.float-note {
  position: fixed;
  right: 18px;
  bottom: 18px;
  z-index: 60;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, .94);
  color: var(--muted);
  border-radius: 999px;
  padding: 10px 14px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  box-shadow: 0 10px 24px rgba(24, 16, 8, .14);
}

.float-note.open {
  color: var(--teal);
  border-color: rgba(15, 118, 110, .24);
  background: #f2fbf9;
}

.note-code {
  min-width: 18px;
  height: 18px;
  border-radius: 999px;
  background: rgba(15, 118, 110, .10);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 800;
}

.note-drawer {
  position: fixed;
  right: 18px;
  bottom: 66px;
  z-index: 59;
  width: 360px;
  max-width: calc(100vw - 36px);
  max-height: calc(100vh - 120px);
  overflow: auto;
  display: none;
  padding: 16px;
  border: 1px solid rgba(74, 54, 33, .10);
  border-radius: 22px;
  background: rgba(255, 250, 244, .98);
  box-shadow: 0 18px 44px rgba(74, 48, 24, .16);
}

.note-drawer.open {
  display: block;
}

.note-title {
  font-size: 16px;
  font-weight: 800;
}

.note-sub {
  margin-top: 6px;
  font-size: 12px;
  line-height: 1.68;
  color: var(--muted);
}

.note-list {
  margin-top: 12px;
  display: grid;
  gap: 10px;
}

.note-item {
  padding: 12px;
  border-radius: 16px;
  border: 1px solid rgba(74, 54, 33, .08);
  background: rgba(255, 255, 255, .82);
  font-size: 12px;
  line-height: 1.7;
  color: var(--muted);
}

.note-item strong {
  display: block;
  margin-bottom: 4px;
  color: var(--ink);
  font-size: 13px;
}

@media (max-width: 1200px) {
  .detail-grid {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 980px) {
  .brand-title {
    display: none;
  }

  .page {
    height: auto;
    min-height: calc(100vh - 46px);
  }

  .view,
  .panel {
    height: auto;
    min-height: calc(100vh - 66px);
  }

  .matrix-shell {
    height: auto;
  }

  .overview-list,
  .overview-summary {
    grid-template-columns: 1fr;
  }

  .stats {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .note-drawer {
    left: 10px;
    right: 10px;
    width: auto;
    max-width: none;
  }
}
</style>
</head>
<body>
<div class="top">
  <div class="brand">
    <img src="../CANNlogo.png" alt="CANN">
    <div class="brand-title">CANN 体验看板 · 方案对比</div>
  </div>
  <div class="tabs" id="tabs">
    <button class="tab active" data-view="legacy-view">
      <span class="tab-code">0</span>
      <span class="tab-label">当前方案</span>
    </button>
    <button class="tab" data-view="view-a">
      <span class="tab-code">A</span>
      <span class="tab-label">证据矩阵台</span>
    </button>
  </div>
</div>

<div class="page" id="page">
  <section class="view active" id="legacy-view">
    <div class="panel legacy-shell">
      <div class="legacy-actions">
        <a class="ghost-btn" href="design-options.html" target="_blank" rel="noopener noreferrer">单独打开当前方案</a>
      </div>
      <iframe class="legacy-frame" id="legacyFrame" title="当前方案预览" scrolling="no"></iframe>
    </div>
  </section>

  <section class="view" id="view-a">
    <div class="panel">
      <div class="matrix-shell">
        <section class="surface">
          <div class="section-head">
            <div class="eyebrow">Layer 1</div>
            <div class="section-title">角色 × 场景总览</div>
            <div class="section-sub">第一屏直接同时铺开多个角色和多个场景。不是先选角色再选场景，而是让团队先看到全局问题分布，再下钻其中一个重点场景。</div>
          </div>
          <div class="overview-summary" id="overviewSummary"></div>
          <div class="overview-list" id="overviewList"></div>
        </section>

        <section class="story-shell">
          <div class="surface hero" id="heroPanel"></div>
          <div class="surface journey-shell">
            <div class="journey-scroll">
              <div class="journey-grid" id="journeyGrid"></div>
            </div>
          </div>
        </section>

        <section class="surface detail-shell">
          <div class="detail-topbar" id="detailTopbar"></div>
          <div class="detail-grid" id="detailGrid"></div>
        </section>
      </div>
    </div>
  </section>
</div>

<button class="float-note" id="floatNote" type="button">
  <span>方案说明</span>
  <span class="note-code" id="noteCode">0</span>
</button>

<aside class="note-drawer" id="noteDrawer">
  <div class="note-title" id="noteTitle"></div>
  <div class="note-sub" id="noteSub"></div>
  <div class="note-list" id="noteList"></div>
</aside>

<script>
const overviewRows = [
  {
    roleLabel: "算子开发者",
    roleDesc: "关注从资料理解到迁移、编译、调测、性能优化的整段链路，通常问题集中在中后段断裂。",
    scenarios: [
      {
        journeyKey: "operator-migrate",
        name: "算子迁移部署",
        score: 57,
        grade: "bad",
        note: "场景分低的根因不是单一步骤失败，而是迁移、编译、调测阶段连续失血。",
        pains: 5,
        vod: 71,
        nextStep: "优先补齐迁移说明、编译报错定位和调测回路。",
        agent: "Agent 在迁移到编译这段链路里多次遇到信息断档，需要来回切文档和工具日志。",
        pain: "迁移约束、shape 限制、编译依赖和调测入口分散，导致问题不是一个按钮能解决，而是一整段流程不断卡住。",
        vodQuote: "社区高频原声集中在编译失败、精度异常、文档描述不一致。"
      },
      {
        journeyKey: "operator-customize",
        name: "Builtin 算子定制修改",
        score: 72,
        grade: "mid",
        note: "设计实现阶段相对顺，但性能调优建议不够可执行，后程效率偏低。",
        pains: 2,
        vod: 33,
        nextStep: "保留设计实现优势，补强性能调优的自动化建议。",
        agent: "Agent 能较快理解样例，但在调优环节难以把指标翻译成具体改法。",
        pain: "工具建议停留在描述层，缺少面向开发动作的下一步。",
        vodQuote: "用户原声更多集中在量化、shape 拦截和性能收益不稳定。"
      }
    ]
  },
  {
    roleLabel: "AI 框架开发者",
    roleDesc: "关注依赖对齐、基础适配、整网优化、精度和性能验证，旅程更偏系统联调而非单算子步骤。",
    scenarios: [
      {
        journeyKey: "framework-tune",
        name: "整网亲和与优化",
        score: 64,
        grade: "mid",
        note: "基础适配已能完成，但整网优化和性能验证阶段证据分散，定位成本高。",
        pains: 3,

}

function getJourney(flowKey) {
  return journeys.find(item => item.key === flowKey);
}

function getStage(flowKey, stageKey) {
  const journey = getJourney(flowKey);
  return journey.steps.find(item => item.key === stageKey);
}

function gradeLabel(grade) {
  if (grade === "bad") return "风险高";
  if (grade === "mid") return "需优化";
  return "相对健康";
}

function renderOverview() {
  const allScenarios = overviewRows.flatMap(row => row.scenarios);
  const badCount = allScenarios.filter(item => item.grade === "bad").length;
  const midCount = allScenarios.filter(item => item.grade === "mid").length;
  const current = getScenario(activeFlow);

  document.getElementById("overviewSummary").innerHTML = `
    <div class="summary-mini">
      <div class="summary-mini-label">角色数量</div>
      <div class="summary-mini-value">${overviewRows.length}</div>
    </div>
    <div class="summary-mini">
      <div class="summary-mini-label">场景数量</div>
      <div class="summary-mini-value">${allScenarios.length}</div>
    </div>
    <div class="summary-mini">
      <div class="summary-mini-label">高风险 / 待优化</div>
      <div class="summary-mini-value">${badCount} / ${midCount}</div>
    </div>
    <div class="summary-mini">
      <div class="summary-mini-label">当前焦点</div>
      <div class="summary-mini-value" style="font-size:14px;line-height:1.55">${current.row.roleLabel} · ${current.scenario.name}</div>
    </div>
  `;

  const html = overviewRows.map(row => `
    <div class="role-group">
      <div class="role-meta">
        <div class="eyebrow">角色</div>
        <div class="role-title">${row.roleLabel}</div>
        <div class="role-desc">${row.roleDesc}</div>
      </div>
      <div class="scenario-list">
        ${row.scenarios.map(item => `
          <button class="scenario-card ${item.grade} ${item.journeyKey === activeFlow ? "active" : ""}" onclick="pickFlow('${item.journeyKey}')">
            <div class="scenario-top">
              <div class="scenario-name">${item.name}</div>
              <div class="score ${item.grade}">${item.score}</div>
            </div>
            <div class="scenario-note">${item.note}</div>
            <div class="chip-row">
              <span class="chip">${gradeLabel(item.grade)}</span>
              <span class="chip">痛点 ${item.pains}</span>
              <span class="chip">VOD ${item.vod}</span>
            </div>
          </button>
        `).join("")}
      </div>
    </div>
  `).join("");

  document.getElementById("overviewList").innerHTML = html;
}

function renderHero() {
  const context = getScenario(activeFlow);
  const journey = getJourney(activeFlow);
  const riskCount = journey.steps.filter(item => item.grade === "bad").length;

  document.getElementById("heroPanel").innerHTML = `
    <div class="hero-top">
      <div>
        <div class="eyebrow">Layer 2</div>
        <div class="hero-title">${context.row.roleLabel} · ${context.scenario.name}</div>
        <div class="hero-sub">${journey.desc} 现在不是左侧选中、右侧读详情，而是把这个场景的整条旅程直接平铺出来，让团队从上到下连续阅读。</div>
      </div>
      <div class="hero-badge">当前选中场景分 <strong>${context.scenario.score}</strong><br>阅读路径改成：先横看场景，再横看阶段，最后下钻证据和动作。</div>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-label">场景综合分</div>
        <div class="stat-value">${context.scenario.score}</div>
      </div>
      <div class="stat">
        <div class="stat-label">阶段数量</div>
        <div class="stat-value">${journey.steps.length}</div>
      </div>
      <div class="stat">
        <div class="stat-label">高风险阶段</div>
        <div class="stat-value">${riskCount}</div>
      </div>
      <div class="stat">
        <div class="stat-label">当前优先动作</div>
        <div class="stat-value" style="font-size:15px;line-height:1.6">${context.scenario.nextStep}</div>
      </div>
    </div>
  `;
}

function renderJourney() {
  const context = getScenario(activeFlow);
  const journey = getJourney(activeFlow);

  document.getElementById("journeyGrid").style.gridTemplateColumns = `220px repeat(${journey.steps.length}, 196px)`;
  document.getElementById("journeyGrid").innerHTML = `
    <div class="journey-intro">
      <div class="eyebrow">Layer 2</div>
      <div class="journey-intro-title">这一层不是导航，是直接把该场景的旅程铺成一条工作带。</div>
      <div class="journey-intro-sub">${context.scenario.note} 用户不需要在左右两个区域来回切换，而是直接沿阶段横向扫描问题扩散路径。</div>
      <div class="chip-row">
        <span class="chip">${context.row.roleLabel}</span>
        <span class="chip">${context.scenario.name}</span>
      </div>
    </div>
    ${journey.steps.map((step, index) => `
      <button class="journey-step ${step.grade} ${step.key === activeStage ? "active" : ""}" onclick="pickStage('${step.key}')">
        <div class="journey-step-top">
          <div>
            <div class="step-index">S${index + 1}</div>
            <div class="step-name">${step.label}</div>
          </div>
          <div class="score ${step.grade}">${step.score}</div>
        </div>
        <div class="step-summary">${step.summary}</div>
        <div class="metric-grid">
          ${step.metrics.map(metric => `
            <div class="metric">
              <div class="metric-label">${metric.label}</div>
              <div class="metric-value">${metric.value}</div>
            </div>
          `).join("")}
        </div>
      </button>
    `).join("")}
  `;
}

function renderDetail() {
  const context = getScenario(activeFlow);
  const step = getStage(activeFlow, activeStage);

  document.getElementById("detailTopbar").innerHTML = `
    <div>
      <div class="eyebrow">Layer 3</div>
      <div class="detail-title">${context.scenario.name} · ${step.label}</div>
      <div class="detail-sub">最底部是统一证据台：无论你在上面点哪个阶段，证据、原因和产品动作都在这一层收口，而不是散在侧边。</div>
    </div>
    <div class="next-action"><strong>下一步建议：</strong>${context.scenario.nextStep}</div>
  `;

  document.getElementById("detailGrid").innerHTML = `
    <div class="detail-card">
      <h4>Agent 在这一步看到什么</h4>
      <div class="detail-list">
        <div class="detail-item">${step.summary}</div>
        ${step.observations.map(item => `<div class="detail-item">${item}</div>`).join("")}
      </div>
    </div>
    <div class="detail-card">
      <h4>为什么这个场景会低分</h4>
      <div class="detail-list">
        <div class="detail-item">${context.scenario.agent}</div>
        <div class="detail-item">${context.scenario.pain}</div>
        <div class="detail-item">当多个阶段连续失血时，用户感知到的是“整个场景难用”，而不是单点功能缺失。</div>
      </div>
    </div>
    <div class="detail-card">
      <h4>VOD 与产品动作</h4>
      <div class="detail-list">
        <div class="detail-item">${context.scenario.vodQuote}</div>
        <div class="detail-item">场景层面已有痛点 ${context.scenario.pains} 条、VOD ${context.scenario.vod} 条，不是偶发个案。</div>
        <div class="detail-item">建议动作：${context.scenario.nextStep}</div>
      </div>
    </div>
  `;
}

function renderA() {
  renderOverview();
  renderHero();
  renderJourney();
  renderDetail();
}

function renderNotes() {
  const note = noteContent[currentView];
  document.getElementById("noteCode").textContent = note.code;
  document.getElementById("noteTitle").textContent = note.title;
  document.getElementById("noteSub").textContent = note.sub;
  document.getElementById("noteList").innerHTML = note.items.map(item => `
    <div class="note-item">
      <strong>${item.title}</strong>
      ${item.text}
    </div>
  `).join("");
}

function syncLegacyFrameHeight() {
  const frame = document.getElementById("legacyFrame");
  if (!frame) return;

  try {
    const doc = frame.contentDocument || frame.contentWindow.document;
    if (!doc) return;
    const body = doc.body;
    const html = doc.documentElement;
    const height = Math.max(
      body ? body.scrollHeight : 0,
      body ? body.offsetHeight : 0,
      html ? html.scrollHeight : 0,
      html ? html.offsetHeight : 0,
      html ? html.clientHeight : 0
    );
    if (height > 0) {
      frame.style.height = `${height}px`;
    }
  } catch (error) {
    // local preview fallback: if access is restricted, keep iframe viewport mode
  }
}

function enableLegacyAutoHeight() {
  clearInterval(legacyHeightTimer);
  syncLegacyFrameHeight();
  legacyHeightTimer = setInterval(syncLegacyFrameHeight, 600);
  setTimeout(() => clearInterval(legacyHeightTimer), 8000);
}

function updatePageMode() {
  document.getElementById("page").classList.toggle("legacy-mode", currentView === "legacy-view");
}

function resetAViewPosition() {
  const shell = document.querySelector("#view-a .matrix-shell");
  if (shell) shell.scrollTop = 0;
  const panel = document.querySelector("#view-a .panel");
  if (panel) panel.scrollTop = 0;
  window.scrollTo({ top: 0, behavior: "auto" });
}

function mountLegacyFrame() {
  const frame = document.getElementById("legacyFrame");
  if (!frame || !window.DESIGN_OPTIONS_BASE64) return;
  const html = decodeURIComponent(escape(window.atob(window.DESIGN_OPTIONS_BASE64)));
  frame.srcdoc = html;
}

function pickFlow(flowKey) {
  activeFlow = flowKey;
  const journey = getJourney(flowKey);
  activeStage = (journey.steps.find(item => item.grade === "bad") || journey.steps[0]).key;
  renderA();
}

function pickStage(stageKey) {
  activeStage = stageKey;
  renderDetail();
  renderJourney();
}

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    currentView = tab.dataset.view;
    document.querySelectorAll(".tab").forEach(item => item.classList.toggle("active", item === tab));
    document.querySelectorAll(".view").forEach(view => view.classList.toggle("active", view.id === currentView));
    updatePageMode();
    renderNotes();
    if (currentView === "legacy-view") {
      enableLegacyAutoHeight();
    } else if (currentView === "view-a") {
      resetAViewPosition();
    }
  });
});

document.getElementById("floatNote").addEventListener("click", () => {
  document.getElementById("floatNote").classList.toggle("open");
  document.getElementById("noteDrawer").classList.toggle("open");
});

renderA();
updatePageMode();
renderNotes();
document.getElementById("legacyFrame").addEventListener("load", enableLegacyAutoHeight);
</script>
<script src="design-options-inline.js"></script>
<script>
mountLegacyFrame();
</script>
</body>
</html>
