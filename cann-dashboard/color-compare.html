<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>矩阵颜色方案对比</title>
<style>
  body{margin:0;padding:32px;font-family:system-ui,sans-serif;background:#F3F3F5;color:#1B2432}
  h2{font-size:13px;font-weight:700;color:#898E95;text-transform:uppercase;letter-spacing:.06em;margin:0 0 12px}
  .scheme{background:#fff;border:1px solid #E1E2E4;border-radius:12px;padding:20px 24px;margin-bottom:24px}
  .scheme-title{font-size:16px;font-weight:800;margin-bottom:4px}
  .scheme-desc{font-size:12px;color:#898E95;margin-bottom:16px}
  .grid{display:grid;grid-template-columns:110px repeat(5,1fr);gap:5px}
  .lbl{font-size:11px;font-weight:700;color:#565C65;display:flex;align-items:center;padding:0 4px}
  .cell{height:44px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;font-weight:800;font-family:monospace}
  .sub{font-size:9px;font-weight:600;opacity:.65;margin-top:1px}
  .hdr{font-size:10px;font-weight:700;color:#898E95;text-align:center;padding:4px 0;text-transform:uppercase}
  .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;margin-right:8px}
</style>
</head>
<body>

<h2>矩阵颜色方案对比 — 选择后告知 Claude</h2>

<!-- ── 方案 A ── -->
<div class="scheme">
  <div class="scheme-title"><span class="badge" style="background:#FFC3C3;color:#1B2432">A</span>均匀明度 <span style="font-size:12px;font-weight:500;color:#898E95">（当前已上线）</span></div>
  <div class="scheme-desc">红→橙→黄→薄荷→青绿，所有格子亮度相近，视觉柔和均匀</div>
  <div class="grid" id="gA"></div>
</div>

<!-- ── 方案 B ── -->
<div class="scheme">
  <div class="scheme-title"><span class="badge" style="background:#FF8080;color:#fff">B</span>鲜明渐变</div>
  <div class="scheme-desc">更饱和的红→橙→黄→绿，好/差对比更强，一眼看出问题所在</div>
  <div class="grid" id="gB"></div>
</div>

<!-- ── 方案 C ── -->
<div class="scheme">
  <div class="scheme-title"><span class="badge" style="background:#FC636B;color:#fff">C</span>Token 三段式</div>
  <div class="scheme-desc">与看板 coral / gold / green token 完全一致，差=珊瑚红段、中=金色段、好=青绿段</div>
  <div class="grid" id="gC"></div>
</div>

<script>
const scores=[20,38,52,68,85];
const labels=['算子编程','AI框架','文档质量','推理部署','社区生态'];
const rows=['Agent评分','痛点密度','VOD声量','综合评分'];

function colorA(s){
  const stops=[[0,[255,195,195]],[35,[255,210,155]],[55,[255,237,140]],[75,[176,238,215]],[100,[120,215,185]]];
  let a=stops[0],b=stops[stops.length-1];
  for(let i=0;i<stops.length-1;i++){if(s>=stops[i][0]&&s<=stops[i+1][0]){a=stops[i];b=stops[i+1];break;}}
  const t=(s-a[0])/(b[0]-a[0]||1);
  const c=a[1].map((v,j)=>Math.round(v+(b[1][j]-v)*t));
  return[`rgb(${c[0]},${c[1]},${c[2]})`, '#1B2432'];
}
function colorB(s){
  const stops=[[0,[255,128,128]],[35,[255,179,71]],[55,[255,212,59]],[70,[168,227,75]],[100,[55,197,151]]];
  let a=stops[0],b=stops[stops.length-1];
  for(let i=0;i<stops.length-1;i++){if(s>=stops[i][0]&&s<=stops[i+1][0]){a=stops[i];b=stops[i+1];break;}}
  const t=(s-a[0])/(b[0]-a[0]||1);
  const c=a[1].map((v,j)=>Math.round(v+(b[1][j]-v)*t));
  const fg=s>=45?'#1B2432':'#fff';
  return[`rgb(${c[0]},${c[1]},${c[2]})`,fg];
}
function colorC(s){
  let stops;
  if(s<40) stops=[[0,[254,239,240]],[39,[252,99,107]]];
  else if(s<60) stops=[[40,[255,248,230]],[59,[255,185,0]]];
  else stops=[[60,[235,252,247]],[100,[55,197,151]]];
  const a=stops[0],b=stops[stops.length-1];
  const t=(s-a[0])/(b[0]-a[0]||1);
  const c=a[1].map((v,j)=>Math.round(v+(b[1][j]-v)*t));
  return[`rgb(${c[0]},${c[1]},${c[2]})`, '#1B2432'];
}

function render(id, colorFn){
  const g=document.getElementById(id);
  let h='<div></div>';
  scores.forEach((s,i)=>h+=`<div class="hdr">${labels[i]}</div>`);
  rows.forEach(r=>{
    h+=`<div class="lbl">${r}</div>`;
    scores.forEach(s=>{
      const vs=Math.round(s+(Math.random()*16-8));
      const [bg,fg]=colorFn(Math.max(0,Math.min(100,vs)));
      const cls=vs<40?'严重':vs<60?'关注':'健康';
      h+=`<div class="cell" style="background:${bg};color:${fg}">${vs}<div class="sub">${cls}</div></div>`;
    });
  });
  g.innerHTML=h;
}

render('gA',colorA);
render('gB',colorB);
render('gC',colorC);
</script>
</body>
</html>
